<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AKI NO MASS | Sistema de Gestión Comercial Multicanal</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <section id="login-view" class="login-view">
      <div class="login-card">
        <h1>AKI NO MASS</h1>
        <p>Sistema de Gestión Comercial Multicanal</p>
        <form id="login-form">
          <label for="usuario">Usuario</label>
          <input id="usuario" name="usuario" type="text" placeholder="demo@akinomass.com" required />
          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" placeholder="••••••••" required />
          <button type="submit">Ingresar al sistema</button>
        </form>
      </div>
    </section>

    <section id="main-view" class="main-view hidden">
      <aside class="sidebar">
        <div>
          <h2>AKI NO MASS</h2>
          <small>Gestión Comercial</small>
        </div>
        <nav id="menu">
          <button data-view="dashboard" class="menu-item active">📊 Dashboard</button>
          <button data-view="clientes" class="menu-item">👥 Clientes</button>
          <button data-view="productos" class="menu-item">🧥 Productos</button>
          <button data-view="pedidos" class="menu-item">🧾 Pedidos</button>
          <button data-view="canales" class="menu-item">📱 Canales</button>
          <button data-view="seguimiento" class="menu-item">🎯 Seguimiento</button>
          <button data-view="reportes" class="menu-item">📈 Reportes</button>
          <button data-view="configuracion" class="menu-item">⚙️ Configuración</button>
        </nav>
        <button id="logout" class="logout">Cerrar sesión</button>
      </aside>

      <main class="content">
        <header class="topbar">
          <div>
            <h1 id="view-title">Dashboard</h1>
            <p>Sistema de Gestión Comercial Multicanal</p>
          </div>
          <div class="demo-pill">Modo Demo Activo</div>
        </header>

        <section id="view-container"></section>
      </main>
    </section>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
